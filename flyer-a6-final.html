<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Feedback – Allianz Agentur Vogelsberger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    @page {
      size: 105mm 148mm;
      margin: 0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 105mm;
      height: 148mm;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #fff;
      color: #111;
      overflow: hidden;
    }

    .page {
      width: 105mm;
      height: 148mm;
      padding: 12mm;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      position: relative;
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4mm;
      background: #003781;
    }

    .header {
      text-align: center;
      margin-bottom: 6mm;
    }

    .header__agency {
      font-size: 7.5pt;
      font-weight: 600;
      color: #003781;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: block;
    }

    .header__name {
      font-size: 6pt;
      font-weight: 400;
      color: #888;
      display: block;
      margin-top: 1mm;
      letter-spacing: 0.02em;
    }

    .header__location {
      font-size: 6pt;
      font-weight: 400;
      color: #888;
      display: block;
      margin-top: 0.3mm;
      letter-spacing: 0.02em;
    }

    .headline {
      font-size: 20pt;
      font-weight: 700;
      color: #111;
      text-align: center;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 2.5mm;
    }

    .subline {
      font-size: 6.5pt;
      font-weight: 400;
      color: #666;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 6mm;
    }

    .qr {
      width: 60mm;
      height: 60mm;
      margin-bottom: 5mm;
    }

    .qr img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .cta {
      font-size: 8.5pt;
      font-weight: 600;
      color: #003781;
      text-align: center;
      letter-spacing: 0.02em;
      margin-bottom: 2mm;
    }

    .micro {
      font-size: 5.5pt;
      font-weight: 400;
      color: #aaa;
      text-align: center;
      margin-bottom: 6mm;
    }

    .footer {
      text-align: center;
    }

    .footer__line {
      font-size: 5.5pt;
      font-weight: 400;
      color: #999;
      display: block;
      line-height: 1.7;
    }

    .print-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      background: #003781;
      color: #fff;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    .print-btn:hover { background: #00265a; }

    @media print {
      .print-btn { display: none; }
    }

    @media screen {
      body {
        width: auto; height: auto;
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        background: #e8e8e8;
      }
    }
  </style>
</head>
<body>
  <button class="print-btn" onclick="window.print()">PDF drucken</button>
  <div class="page">
    <div class="topbar"></div>
    <div class="header">
      <span class="header__agency">ALLIANZ AGENTUR</span>
      <span class="header__name">Manfred Vogelsberger</span>
      <span class="header__location">Matrei am Brenner</span>
    </div>
    <h1 class="headline">Ihre Meinung zählt.</h1>
    <p class="subline">Scannen Sie den QR-Code und geben Sie Feedback.</p>
    <div class="qr"><img src="qr/qr.svg" alt="QR-Code"></div>
    <span class="cta">QR-Code scannen und Feedback geben</span>
    <span class="micro">Dauert nur 10 Sekunden</span>
    <div class="footer">
      <span class="footer__line">05273 200 88</span>
      <span class="footer__line">agentur.vogelsberger@allianz.at</span>
    </div>
  </div>
</body>
</html>
