<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback-Karte – Allianz Agentur Vogelsberger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @page {
      size: 100mm 150mm;
      margin: 0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100mm;
      height: 150mm;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #ffffff;
      color: #111827;
      overflow: hidden;
    }

    .card {
      width: 100mm;
      height: 150mm;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 10mm 10mm 8mm;
      position: relative;
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 24mm;
      height: 0.6mm;
      background: #003781;
      border-radius: 0 0 1mm 1mm;
    }

    /* Logo area */
    .card__top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3mm;
      padding-top: 2mm;
    }

    .card__logo {
      display: flex;
      align-items: center;
      gap: 2mm;
    }

    .card__logo-mark {
      width: 5.5mm;
      height: auto;
    }

    .card__logo-text {
      font-size: 7pt;
      font-weight: 700;
      color: #003781;
      letter-spacing: 0.06em;
    }

    .card__headline {
      font-size: 15pt;
      font-weight: 700;
      color: #111827;
      letter-spacing: -0.02em;
      text-align: center;
      line-height: 1.2;
    }

    .card__subline {
      font-size: 7pt;
      font-weight: 400;
      color: #6b7280;
      text-align: center;
      line-height: 1.45;
      max-width: 65mm;
    }

    /* QR section */
    .card__qr {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4mm;
    }

    .card__qr img {
      width: 48mm;
      height: 48mm;
      display: block;
    }

    .card__cta {
      font-size: 8pt;
      font-weight: 600;
      color: #003781;
      text-align: center;
      letter-spacing: 0.01em;
    }

    .card__time {
      font-size: 6.5pt;
      font-weight: 400;
      color: #9ca3af;
      text-align: center;
    }

    /* Footer */
    .card__footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1mm;
      padding-top: 2mm;
      border-top: 0.3px solid #e5e7eb;
      width: 100%;
    }

    .card__agency {
      font-size: 6.5pt;
      font-weight: 600;
      color: #003781;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .card__name {
      font-size: 6pt;
      font-weight: 400;
      color: #6b7280;
      text-align: center;
    }

    .card__phone {
      font-size: 6pt;
      font-weight: 400;
      color: #9ca3af;
      text-align: center;
    }

    @media print {
      html, body { width: 100mm; height: 150mm; }
    }

    @media screen {
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #e5e5e5;
        width: auto;
        height: auto;
      }
      .card {
        box-shadow: 0 4px 40px rgba(0,0,0,0.12);
        border-radius: 2mm;
      }
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Top -->
    <div class="card__top">
      <div class="card__logo">
        <svg class="card__logo-mark" viewBox="0 0 40 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 10 L20 3 L36 10 L36 28 C36 37 20 46 20 46 C20 46 4 37 4 28Z" fill="#003781"/>
          <path d="M20 14 L14 23 L18.5 23 L16 32 L27 21 L22.5 21 L25 14Z" fill="white"/>
        </svg>
        <span class="card__logo-text">ALLIANZ</span>
      </div>

      <h1 class="card__headline">Ihre Meinung<br>zählt</h1>
      <p class="card__subline">Helfen Sie uns, unseren Service<br>weiter zu verbessern.</p>
    </div>

    <!-- QR -->
    <div class="card__qr">
      <img src="qr/qr.svg" alt="QR-Code scannen">
      <span class="card__cta">Jetzt scannen und Feedback geben</span>
      <span class="card__time">Dauert nur 10 Sekunden</span>
    </div>

    <!-- Footer -->
    <div class="card__footer">
      <span class="card__agency">Allianz Agentur</span>
      <span class="card__name">Manfred Vogelsberger · Matrei am Brenner</span>
      <span class="card__phone">05273 200 88</span>
    </div>

  </div>
</body>
</html>
